name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --locked --extra dev
      - run: uv run pytest -q
      - run: uv run ruff check .

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - run: uv build
      - name: Smoke test built wheel
        run: |
          uv venv /tmp/acyro-smoke --python 3.12
          uv pip install --python /tmp/acyro-smoke/bin/python dist/*.whl
          /tmp/acyro-smoke/bin/python -c "import acyro"
          /tmp/acyro-smoke/bin/acyro --help
